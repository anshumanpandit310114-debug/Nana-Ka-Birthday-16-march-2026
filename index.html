<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Grandpa!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Confetti animation */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f0f;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 4em;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .subtitle {
            font-size: 2em;
            color: #ffd700;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .cake {
            font-size: 5em;
            margin: 30px 0;
            animation: wobble 0.6s ease-in-out infinite;
        }

        @keyframes wobble {
            0%, 100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(-3deg);
            }
            75% {
                transform: rotate(3deg);
            }
        }

        .message {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin: 30px 0;
        }

        .message p {
            font-size: 1.3em;
            color: #333;
            line-height: 1.8;
            margin: 15px 0;
        }

        .buttons {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #ffd700;
            color: #333;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: #ffed4e;
        }

        .balloons {
            position: absolute;
            font-size: 3em;
            animation: float 3s ease-in-out infinite;
        }

        .balloon1 {
            left: 10%;
            top: 20%;
            animation-delay: 0s;
        }

        .balloon2 {
            right: 10%;
            top: 30%;
            animation-delay: 0.5s;
        }

        .balloon3 {
            left: 15%;
            bottom: 20%;
            animation-delay: 1s;
        }

        .balloon4 {
            right: 15%;
            bottom: 15%;
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-30px);
            }
        }
    </style>
</head>
<body>
    <div class="balloons balloon1">🎈</div>
    <div class="balloons balloon2">🎈</div>
    <div class="balloons balloon3">🎈</div>
    <div class="balloons balloon4">🎈</div>

    <div class="container">
        <h1>🎉 Happy Birthday Grandpa! 🎉</h1>
        <div class="subtitle">Wishing You The Best Day Ever!</div>
        
        <div class="cake">🎂</div>

        <div class="message">
            <p>🌟 On your special day, we celebrate YOU! 🌟</p>
            <p>Thank you for all the love, wisdom, and wonderful memories you've shared with us.</p>
            <p>Have an absolutely amazing birthday filled with joy, laughter, and cake!</p>
            <p>You deserve the very best!</p>
        </div>

        <div class="buttons">
            <button onclick="celebrate()">🎊 Celebrate!</button>
            <button onclick="playMusic()">🎵 Play Music!</button>
        </div>
    </div>

    <script>
        // Create confetti
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = ['#ff6b6b', '#ffd700', '#4ecdc4', '#45b7d1', '#f08080'][Math.floor(Math.random() * 5)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3500);
            }
        }

        function celebrate() {
            createConfetti();
            alert('🎉 Cheers to a wonderful grandpa! 🎉');
        }

        function playMusic() {
            // Create a simple celebration sound effect
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [523.25, 659.25, 783.99]; // C, E, G (happy chord)
            
            notes.forEach((freq, index) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                
                osc.start(audioContext.currentTime + index * 0.2);
                osc.stop(audioContext.currentTime + index * 0.2 + 0.5);
            });
        }

        // Auto-create confetti on page load
        window.addEventListener('load', () => {
            createConfetti();
        });
    </script>
</body>
</html>
